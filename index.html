<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📊 젠트라 데이터 분석기</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    :root{
      --bg:#f6f8fb;
      --card:#ffffff;
      --line:#d8dee9;
      --text:#1f2937;
      --muted:#6b7280;
      --accent:#1b5e20;
      --accent2:#0f766e;
      --danger:#b91c1c;
      --shadow:0 10px 30px rgba(17,24,39,.08);
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:linear-gradient(180deg,#f8fafc 0%, #eef3f8 100%);
      color:var(--text);
      font-family:Arial, Helvetica, sans-serif;
    }
    header{
      padding:28px 22px 10px;
      max-width:1600px;
      margin:0 auto;
    }
    h1{margin:0 0 8px;font-size:28px}
    .sub{color:var(--muted);font-size:14px;line-height:1.5}
    .wrap{
      max-width:1600px;
      margin:0 auto;
      padding:12px 22px 30px;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:16px;
      align-items:start;
    }
    @media (max-width: 1280px){
      .grid{grid-template-columns:1fr}
    }
    .panel{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .panel-head{
      padding:16px 16px 14px;
      background:linear-gradient(135deg, #f8fbff 0%, #eef7ef 100%);
      border-bottom:1px solid var(--line);
    }
    .panel-title{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin:0;
      font-size:18px;
    }
    .badge{
      font-size:12px;
      color:#fff;
      background:var(--accent);
      padding:5px 10px;
      border-radius:999px;
      white-space:nowrap;
    }
    .panel-body{padding:16px}
    .section{
      margin-bottom:16px;
      padding:14px;
      border:1px solid #edf0f4;
      background:#fbfcfe;
      border-radius:14px;
    }
    .section h3{
      margin:0 0 10px;
      font-size:15px;
    }
    .field{
      margin-bottom:10px;
    }
    .field label{
      display:block;
      font-size:12px;
      color:var(--muted);
      margin-bottom:6px;
    }
    input[type="file"],
    input[type="text"],
    input[type="datetime-local"]{
      width:100%;
      padding:10px 12px;
      border:1px solid var(--line);
      border-radius:12px;
      background:#fff;
      font-size:14px;
      outline:none;
    }
    input[type="datetime-local"]{padding:9px 10px}
    .name-row{
      display:flex;
      gap:8px;
      align-items:center;
    }
    .name-row input{flex:1;min-width:0}
    .btnrow{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }
    .action-bar{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin:2px 0 14px;
    }
    button{
      border:0;
      border-radius:12px;
      padding:9px 12px;
      cursor:pointer;
      font-size:13px;
      background:#e5e7eb;
      color:#111827;
      transition:.15s ease;
    }
    button:hover{transform:translateY(-1px)}
    .primary{background:var(--accent); color:#fff}
    .teal{background:var(--accent2); color:#fff}
    .danger{background:var(--danger); color:#fff}
    .ghost{background:#f3f4f6}
    .active{
      background:var(--accent) !important;
      color:#fff !important;
    }
    .meta{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
      font-size:13px;
    }
    .meta .box{
      padding:10px 12px;
      border-radius:12px;
      background:#fff;
      border:1px solid var(--line);
      min-height:62px;
    }
    .meta .box b{display:block;margin-bottom:5px}
    .tiny{font-size:12px;color:var(--muted);line-height:1.45}
    .status{
      font-size:13px;
      color:var(--muted);
      background:#fff;
      border:1px dashed var(--line);
      padding:10px 12px;
      border-radius:12px;
      white-space:pre-wrap;
      line-height:1.5;
    }
    .analysis-block{
      margin-top:14px;
      padding:14px;
      border-radius:14px;
      border:1px solid var(--line);
      background:#fff;
    }
    .analysis-block h4{margin:0 0 8px;font-size:14px}
    .chartbox{
      position:relative;
      height:200px;
      width:100%;
    }
    .chartbox canvas{
      width:100% !important;
      height:100% !important;
      max-width:100%;
    }
    .tablewrap{
      overflow:auto;
      max-height:360px;
      border:1px solid var(--line);
      border-radius:12px;
      background:#fff;
    }
    table{
      border-collapse:collapse;
      width:100%;
      font-size:12px;
    }
    th,td{
      border:1px solid #e5e7eb;
      padding:6px 8px;
      text-align:left;
      vertical-align:top;
      white-space:nowrap;
    }
    th{
      position:sticky;
      top:0;
      background:#f8fafc;
      z-index:1;
    }
    .collapse{display:none}
    .divider{
      height:1px;
      background:#edf0f4;
      margin:12px 0;
    }
  </style>
</head>
<body>
  <header>
    <h1>📊 젠트라 데이터 분석기</h1>
    <div class="sub">
      주의 - 경향성 파악용으로만 사용해주세요.
    </div>
  </header>

  <div class="wrap">
    <div class="grid" id="app"></div>

    <div class="action-bar" style="justify-content:center; margin:18px 0 10px;">
      <button class="primary" id="globalRunBtn">종합 분석기</button>
    </div>

    <section class="panel" id="global-panel">
      <div class="panel-head">
        <h2 class="panel-title">
          <span>종합 분석기</span>
          <span class="badge">전체 결합</span>
        </h2>
      </div>
      <div class="panel-body">
        <div class="section">
          <h3>전체 요약</h3>
          <div id="globalSummary" class="status">아직 종합 분석 전입니다.</div>
        </div>

        <div class="analysis-block">
          <h4>종합 그래프</h4>
          <div class="chartbox">
            <canvas id="globalTrendChart"></canvas>
          </div>
          <div style="margin-top:10px">
            <div class="tiny" style="margin-bottom:8px"><b>x축 표시 설정</b></div>
            <div class="btnrow">
              <button class="ghost" id="globalTimeYear">년도</button>
              <button class="ghost" id="globalTimeMonth">월</button>
              <button class="ghost" id="globalTimeDay">일</button>
              <button class="ghost" id="globalTimeHour">시간</button>
            </div>
          </div>
        </div>

        <div class="analysis-block">
          <h4>변수 간 상관분석</h4>
          <div id="globalCorrelation" class="status">아직 종합 분석 전입니다.</div>
        </div>

      </div>
    </section>

    <div class="section" style="margin-top:16px">
      <h3>종합분석기 다운로드</h3>
      <div class="tiny">이미지 다운은 현재 존재하는 그래프만 모아서 ZIP 파일로 내려받습니다.</div>
      <div class="btnrow" style="margin-top:10px">
        <button class="ghost" id="globalDownloadImages">이미지 다운</button>
        <button class="ghost" id="globalDownloadPdf">분석 결과 다운(pdf)</button>
      </div>
    </div>
  </div>

  <div id="pdfReport" style="position:fixed;left:-10000px;top:0;width:900px;background:#fff;color:#111;padding:24px;font-family:Arial, Helvetica, sans-serif;"></div>

<script>
const app = document.getElementById('app');
const pastel = ['#ffd9d9','#ffe9cc','#fff4cc','#e4f7d2','#d8f5e8','#d9f0ff','#e3e0ff','#f3d9ff'];
const states = {};
const charts = {};
let globalTimeMode = 'year';

function createState(idx){
  states[idx] = {
    rawData: [],
    colInfo: [],
    selectedPorts: new Set(),
    selectedTopics: new Set(),
    timeMode: 'year',
    currentTableData: [],
    portColors: {}
  };
}

function getState(idx){ return states[idx]; }

function clean(v){
  return String(v ?? '').trim();
}

function getColor(idx, port){
  const s = getState(idx);
  if(!s.portColors[port]){
    const keys = Object.keys(s.portColors);
    s.portColors[port] = pastel[keys.length % pastel.length];
  }
  return s.portColors[port];
}

function excelDateToLabel(v){
  let d;
  if(typeof v === 'number'){
    const utc = Math.round((v - 25569) * 86400 * 1000);
    d = new Date(utc - (9 * 60 * 60 * 1000));
  } else {
    d = new Date(v);
  }
  if(isNaN(d)) return clean(v);

  const year = d.getFullYear();
  const month = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  let hour = d.getHours();
  const ampm = hour >= 12 ? '오후' : '오전';
  hour = hour % 12;
  if(hour === 0) hour = 12;
  hour = String(hour).padStart(2,'0');
  const min = String(d.getMinutes()).padStart(2,'0');
  const sec = String(d.getSeconds()).padStart(2,'0');
  return `${year}-${month}-${day}-${hour}시-${min}분-${sec}초 (${ampm})`;
}

function parseLabelToDate(label){
  const m = String(label).match(/(\d+)-(\d+)-(\d+)-(\d+)시-(\d+)분-(\d+)초 \((오전|오후)\)/);
  if(!m) return null;
  let hour = parseInt(m[4], 10);
  if(m[7] === '오후' && hour < 12) hour += 12;
  if(m[7] === '오전' && hour === 12) hour = 0;
  return new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]), hour, Number(m[5]), Number(m[6]));
}

function fmtTick(label, mode){
  const m = String(label).match(/(\d+)-(\d+)-(\d+)-(\d+)시-(\d+)분-(\d+)초 \((오전|오후)\)/);
  if(!m) return label;
  if(mode === 'year') return m[1];
  if(mode === 'month') return `${m[1]}-${m[2]}`;
  if(mode === 'day') return `${m[2]}-${m[3]}`;
  if(mode === 'hour') return `${m[4]}:${m[5]}`;
  return label;
}

function parseExcel(sheet){
  const data = XLSX.utils.sheet_to_json(sheet, { header:1, defval:'' });
  const portRow = data[0] || [];
  const deviceRow = data[1] || [];
  const topicRow = data[2] || [];
  const merges = sheet['!merges'] || [];
  const portBlocks = [];

  merges.forEach(m => {
    if(m.s.r === 0){
      portBlocks.push({
        port: clean(portRow[m.s.c]),
        device: clean(deviceRow[m.s.c]),
        start: m.s.c,
        end: m.e.c
      });
    }
  });

  for(let c = 1; c < portRow.length; c++){
    if(portRow[c] && !portBlocks.some(b => c >= b.start && c <= b.end)){
      portBlocks.push({
        port: clean(portRow[c]),
        device: clean(deviceRow[c]),
        start: c,
        end: c
      });
    }
  }

  const colInfo = [];
  portBlocks.forEach(b => {
    for(let c = b.start; c <= b.end; c++){
      colInfo.push({
        col: c,
        port: b.port,
        device: b.device,
        topic: clean(topicRow[c])
      });
    }
  });

  const result = [];
  for(let r = 4; r < data.length; r++){
    const date = excelDateToLabel(data[r]?.[0]);
    if(!date) continue;
    colInfo.forEach(c => {
      result.push({
        날짜: date,
        포트: c.port,
        장비: c.device,
        주제: c.topic,
        값: Number(data[r][c.col]) || 0
      });
    });
  }

  return { colInfo, result };
}

function uniqueDates(rawData){
  const list = [];
  rawData.forEach(d => {
    if(d.날짜 && !list.includes(d.날짜)) list.push(d.날짜);
  });
  return list;
}

function renderPanel(idx){
  const accent = idx === 1 ? 'primary' : idx === 2 ? 'teal' : 'danger';
  const html = `
    <section class="panel" id="panel-${idx}">
      <div class="panel-head">
        <h2 class="panel-title">
          <span>분석기 ${idx}</span>
          <span class="badge">독립 상태</span>
        </h2>
      </div>
      <div class="panel-body">
        <div class="section">
          <h3>1) 업로드</h3>
          <div class="field">
            <label>이름</label>
            <div class="name-row">
              <input type="text" id="userName-${idx}" placeholder="이름 입력">
              <button class="ghost" id="nameConfirm-${idx}">확인</button>
            </div>
          </div>
          <div class="field">
            <label>엑셀 파일</label>
            <input type="file" id="fileInput-${idx}" accept=".xlsx,.xls">
          </div>
          <div class="btnrow">
            <button class="${accent}" id="loadBtn-${idx}">불러오기</button>
            <button class="ghost" id="resetBtn-${idx}">초기화</button>
          </div>
        </div>

        <div class="section">
          <h3>2) 기간</h3>
          <div id="periodInfo-${idx}" class="status">파일을 업로드하면 기간이 표시됩니다.</div>
          <div class="divider"></div>
          <div class="tiny" style="margin:2px 0 10px;">자동으로 30분 단위로 조정</div>
          <div class="field">
            <label>시작</label>
            <input type="datetime-local" id="startDate-${idx}" step="1800">
          </div>
          <div class="field">
            <label>종료</label>
            <input type="datetime-local" id="endDate-${idx}" step="1800">
          </div>
        </div>

        <div class="section">
          <h3>3) 포트 / 주제</h3>
          <div class="tiny">주제 버튼은 포트가 달라도 계속 보입니다.</div>
          <div class="divider"></div>
          <div class="field">
            <label>포트</label>
            <div id="ports-${idx}" class="btnrow"></div>
          </div>
          <div class="field">
            <label>주제</label>
            <div id="topics-${idx}" class="btnrow"></div>
          </div>
        </div>

        <div class="action-bar">
          <button class="${accent}" id="runBtn-${idx}">분석</button>
          <button class="ghost" id="resetBtn2-${idx}">초기화</button>
        </div>

        <div class="section">
          <h3 id="execTitle-${idx}">이름없음</h3>
          <div class="divider"></div>
          <div id="deviceInfo-${idx}" class="meta"></div>
        </div>

        <div class="analysis-block">
          <h4>그래프</h4>
          <div class="chartbox">
            <canvas id="trendChart-${idx}"></canvas>
          </div>
          <div style="margin-top:10px">
            <div class="tiny" style="margin-bottom:8px"><b>x축 표시 설정</b></div>
            <div class="btnrow">
              <button class="ghost" id="timeYear-${idx}">년도</button>
              <button class="ghost" id="timeMonth-${idx}">월</button>
              <button class="ghost" id="timeDay-${idx}">일</button>
              <button class="ghost" id="timeHour-${idx}">시간</button>
            </div>
          </div>
        </div>

        <div class="analysis-block">
          <h4>종합 분석</h4>
          <button class="ghost" id="toggleInsight-${idx}">결과 보기 / 숨기기</button>
          <div id="insight-${idx}" class="status collapse" style="margin-top:10px"></div>
        </div>

        <div class="analysis-block">
          <h4>표</h4>
          <button class="ghost" id="toggleTable-${idx}">값보기 / 숨기기</button>
          <div id="tableDetail-${idx}" class="collapse" style="margin-top:10px">
            <div class="btnrow" id="tableBtns-${idx}" style="margin-bottom:10px"></div>
            <div id="topicTableArea-${idx}" class="tablewrap"></div>
          </div>
        </div>
      </div>
    </section>
  `;
  app.insertAdjacentHTML('beforeend', html);
}

function setActiveButtons(idx){
  const s = getState(idx);
  document.querySelectorAll(`#ports-${idx} button`).forEach(btn => {
    btn.classList.toggle('active', s.selectedPorts.has(clean(btn.dataset.value)));
  });
  document.querySelectorAll(`#topics-${idx} button`).forEach(btn => {
    btn.classList.toggle('active', s.selectedTopics.has(clean(btn.dataset.value)));
  });
}

function renderPorts(idx){
  const s = getState(idx);
  const ports = [...new Set(s.colInfo.map(x => clean(x.port)))].filter(Boolean);
  const holder = document.getElementById(`ports-${idx}`);
  holder.innerHTML = ports.map(p => `
    <button style="background:${getColor(idx,p)}" data-value="${p}">${p}</button>
  `).join('');
  holder.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => togglePort(idx, btn.dataset.value));
  });
  setActiveButtons(idx);
}

function renderTopics(idx){
  const s = getState(idx);
  const map = new Map();
  s.colInfo.forEach(x => {
    const key = clean(x.port) + '||' + clean(x.topic);
    if(!map.has(key)) map.set(key, { port: clean(x.port), topic: clean(x.topic) });
  });
  const topics = [...map.values()];
  const holder = document.getElementById(`topics-${idx}`);
  holder.innerHTML = topics.map(t => `
    <button style="background:${getColor(idx,t.port)}" data-value="${t.port}||${t.topic}">${t.topic || '(빈 주제)'}</button>
  `).join('');
  holder.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => toggleTopic(idx, btn.dataset.value));
  });
  setActiveButtons(idx);
}

function togglePort(idx, port){
  const s = getState(idx);
  port = clean(port);
  if(s.selectedPorts.has(port)){
    s.selectedPorts.delete(port);
    [...s.selectedTopics].forEach(v => {
      if(v.startsWith(port + '||')) s.selectedTopics.delete(v);
    });
  } else {
    s.selectedPorts.add(port);
  }
  renderPorts(idx);
  renderTopics(idx);
}

function toggleTopic(idx, topicKey){
  const s = getState(idx);
  topicKey = clean(topicKey);
  const port = topicKey.split('||')[0];
  if(s.selectedTopics.has(topicKey)){
    s.selectedTopics.delete(topicKey);
    if([...s.selectedTopics].every(v => !v.startsWith(port + '||'))){
      s.selectedPorts.delete(port);
    }
  } else {
    s.selectedTopics.add(topicKey);
    s.selectedPorts.add(port);
  }
  renderPorts(idx);
  renderTopics(idx);
}

function updatePeriod(idx){
  const s = getState(idx);
  const el = document.getElementById(`periodInfo-${idx}`);
  if(!s.rawData.length){
    el.textContent = '파일을 업로드하면 기간이 표시됩니다.';
    return;
  }
  const dates = uniqueDates(s.rawData);
  if(!dates.length){
    el.textContent = '기간 정보를 찾지 못했습니다.';
    return;
  }
  el.textContent = `${dates[0]} ~ ${dates[dates.length - 1]}`;
}

function setDateLimit(idx){
  const s = getState(idx);
  const dates = uniqueDates(s.rawData);
  if(!dates.length) return;
  const first = parseLabelToDate(dates[0]);
  const last = parseLabelToDate(dates[dates.length - 1]);
  if(!first || !last) return;

  const toInput = d => {
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth()+1).padStart(2,'0');
    const dd = String(d.getDate()).padStart(2,'0');
    const hh = String(d.getHours()).padStart(2,'0');
    const mi = String(d.getMinutes()).padStart(2,'0');
    return `${yyyy}-${mm}-${dd}T${hh}:${mi}`;
  };

  const startEl = document.getElementById(`startDate-${idx}`);
  const endEl = document.getElementById(`endDate-${idx}`);
  startEl.min = toInput(first);
  startEl.max = toInput(last);
  endEl.min = toInput(first);
  endEl.max = toInput(last);
  if(!startEl.value) startEl.value = toInput(first);
  if(!endEl.value) endEl.value = toInput(last);
}

function updateExecTitle(idx){
  const name = document.getElementById(`userName-${idx}`).value.trim();
  document.getElementById(`execTitle-${idx}`).textContent = name || '이름없음';
}

function renderDevice(idx, data){
  const map = {};
  data.forEach(d => {
    if(!map[d.포트]) map[d.포트] = new Set();
    map[d.포트].add(d.장비);
  });
  const box = document.getElementById(`deviceInfo-${idx}`);
  if(!Object.keys(map).length){
    box.innerHTML = '<div class="box">데이터 없음</div>';
    return;
  }
  box.innerHTML = Object.keys(map).map(port => `
    <div class="box"><b>${port}</b><span class="tiny">${[...map[port]].join(', ')}</span></div>
  `).join('');
}

function renderTableArea(idx, data){
  const area = document.getElementById(`topicTableArea-${idx}`);
  if(!data.length){
    area.innerHTML = '<div class="status">데이터 없음</div>';
    return;
  }
  let html = '<table><tr>';
  Object.keys(data[0]).forEach(k => html += `<th>${k}</th>`);
  html += '</tr>';
  data.forEach(r => {
    html += '<tr>';
    Object.values(r).forEach(v => html += `<td>${v}</td>`);
    html += '</tr>';
  });
  html += '</table>';
  area.innerHTML = html;
}


function getAnalyzerName(idx){
  const raw = document.getElementById(`userName-${idx}`)?.value?.trim();
  return raw || '이름없음';
}

function getSeriesLabel(idx, row){
  return `${getAnalyzerName(idx)}-${row.포트}-${row.주제}`;
}

function buildCombinedSeries(){
  const combined = [];
  const included = [];
  for(let idx = 1; idx <= 3; idx++){
    const s = getState(idx);
    if(!s.rawData.length || s.selectedPorts.size === 0 || s.selectedTopics.size === 0) continue;
    const filtered = buildFilteredData(idx);
    if(!filtered.length) continue;
    included.push({ idx, name: getAnalyzerName(idx), count: filtered.length });
    const groups = {};
    filtered.forEach(d => {
      const key = getSeriesLabel(idx, d);
      if(!groups[key]) groups[key] = [];
      groups[key].push({ x: d.날짜, y: d.값 });
    });
    Object.keys(groups).forEach(key => {
      combined.push({
        label: key,
        points: groups[key]
      });
    });
  }
  return { combined, included };
}

function alignSeriesByDate(seriesA, seriesB){
  const mapA = new Map(seriesA.points.map(p => [p.x, p.y]));
  const mapB = new Map(seriesB.points.map(p => [p.x, p.y]));
  const common = [...mapA.keys()].filter(k => mapB.has(k));
  common.sort((a, b) => {
    const da = parseLabelToDate(a);
    const db = parseLabelToDate(b);
    return (da?.getTime?.() || 0) - (db?.getTime?.() || 0);
  });
  const x = common.map(k => mapA.get(k));
  const y = common.map(k => mapB.get(k));
  return { x, y, common };
}

function computeCombinedCorrelation(combined){
  const rel = [];
  for(let i=0;i<combined.length;i++){
    for(let j=i+1;j<combined.length;j++){
      const { x, y, common } = alignSeriesByDate(combined[i], combined[j]);
      if(common.length < 2) continue;
      const r = computeCorrelation(x, y);
      if(r !== null && Math.abs(r) >= 0.7){
        rel.push({
          a: combined[i].label,
          b: combined[j].label,
          r
        });
      }
    }
  }
  rel.sort((a,b) => Math.abs(b.r) - Math.abs(a.r));
  return rel;
}

function drawCombinedTrend(combined){
  const canvas = document.getElementById('globalTrendChart');
  if(charts.global){
    charts.global.destroy();
    charts.global = null;
  }
  if(!combined.length){
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0,0,ctx.canvas.width,ctx.canvas.height);
    return;
  }
  const labels = [...new Set(combined.flatMap(s => s.points.map(p => p.x)))];
  labels.sort((a, b) => {
    const da = parseLabelToDate(a);
    const db = parseLabelToDate(b);
    return (da?.getTime?.() || 0) - (db?.getTime?.() || 0);
  });
  const datasets = combined.map((s, i) => ({
    label: s.label,
    data: labels.map(l => {
      const found = s.points.find(p => p.x === l);
      return found ? found.y : null;
    }),
    borderWidth: 2,
    tension: 0.25,
    pointRadius: 2,
    spanGaps: true
  }));
  charts.global = new Chart(canvas.getContext('2d'), {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: true, position: 'bottom' }
      },
      scales: {
        y: { beginAtZero: true },
        x: {
          ticks: {
            callback: function(value){
              const label = this.getLabelForValue(value);
              return fmtTick(label, globalTimeMode);
            }
          }
        }
      }
    }
  });
}


function downloadCanvasPNG(canvasId, fileName){
  const canvas = document.getElementById(canvasId);
  if(!canvas) return false;
  const link = document.createElement('a');
  link.href = canvas.toDataURL('image/png');
  link.download = fileName;
  link.click();
  return true;
}

function hasChartData(canvasId){
  const canvas = document.getElementById(canvasId);
  if(!canvas) return false;
  const ctx = canvas.getContext('2d');
  try{
    const px = ctx.getImageData(0, 0, Math.min(10, canvas.width || 10), Math.min(10, canvas.height || 10)).data;
    return Array.from(px).some(v => v !== 0);
  }catch(e){
    return false;
  }
}

function getAnalyzerName(idx){
  const name = document.getElementById(`userName-${idx}`).value.trim();
  return name || '이름없음';
}


function safeText(v){
  return String(v ?? '')
    .replace(/<br\s*\/?>/gi, '\n')
    .replace(/<[^>]+>/g, '')
    .replace(/&nbsp;/g, ' ')
    .replace(/&amp;/g, '&')
    .replace(/&lt;/g, '<')
    .replace(/&gt;/g, '>')
    .trim();
}

function getCanvasDataUrl(id){
  const canvas = document.getElementById(id);
  if(!canvas) return null;
  try{
    return canvas.toDataURL('image/png');
  }catch(e){
    return null;
  }
}

async function downloadAvailableCharts(){
  const list = [
    { id: 'trendChart-1', name: '분석기1_그래프.png' },
    { id: 'trendChart-2', name: '분석기2_그래프.png' },
    { id: 'trendChart-3', name: '분석기3_그래프.png' },
    { id: 'globalTrendChart', name: '종합그래프.png' }
  ];

  const available = list.filter(item => {
    const chart = charts[item.id.includes('global') ? 'global' : Number(item.id.split('-')[1])];
    return chart && chart.data && chart.data.datasets && chart.data.datasets.some(ds => ds.data && ds.data.some(v => v !== null && v !== undefined));
  });

  if(!available.length){
    alert('다운로드할 그래프가 없습니다.');
    return;
  }

  if(typeof JSZip === 'undefined'){
    alert('이미지 압축 도구를 불러오지 못했습니다.');
    return;
  }

  const zip = new JSZip();
  for(const item of available){
    const url = getCanvasDataUrl(item.id);
    if(!url) continue;
    const base64 = url.split(',')[1];
    zip.file(item.name, base64, { base64: true });
  }

  const blob = await zip.generateAsync({ type: 'blob' });
  const link = document.createElement('a');
  const objectUrl = URL.createObjectURL(blob);
  link.href = objectUrl;
  link.download = '젠트라_그래프_이미지.zip';
  link.click();
  URL.revokeObjectURL(objectUrl);
}

function padLines(lines, maxLen){
  const out = [];
  for(const line of lines){
    const s = String(line);
    if(!s){
      out.push('');
      continue;
    }
    const chunks = s.match(new RegExp(`.{1,${maxLen}}`, 'g')) || [''];
    out.push(...chunks);
  }
  return out;
}

function addPdfText(doc, lines, x, y, maxWidth, lineHeight, pageBottom){
  const wrapped = [];
  lines.forEach(line => {
    if(line === ''){
      wrapped.push('');
      return;
    }
    const split = doc.splitTextToSize(String(line), maxWidth);
    wrapped.push(...split);
  });

  let cursorY = y;
  wrapped.forEach(line => {
    if(cursorY > pageBottom){
      doc.addPage();
      cursorY = 12;
    }
    doc.text(line, x, cursorY);
    cursorY += lineHeight;
  });
  return cursorY;
}

function addSectionHeader(doc, title, y){
  if(y > 270){
    doc.addPage();
    y = 12;
  }
  doc.setFontSize(15);
  doc.setFont(undefined, 'bold');
  doc.text(title, 12, y);
  doc.setFont(undefined, 'normal');
  return y + 8;
}

function addParagraph(doc, text, y, maxWidth=186, lineHeight=6){
  const lines = doc.splitTextToSize(String(text), maxWidth);
  const pageBottom = 285;
  lines.forEach(line => {
    if(y > pageBottom){
      doc.addPage();
      y = 12;
    }
    doc.setFontSize(10);
    doc.text(line, 12, y);
    y += lineHeight;
  });
  return y;
}

function addChartImage(doc, canvasId, y){
  const img = getCanvasDataUrl(canvasId);
  if(!img) return y;
  const pageWidth = 190;
  const imgW = 180;
  const imgH = 70;
  if(y + imgH > 282){
    doc.addPage();
    y = 12;
  }
  doc.addImage(img, 'PNG', 12, y, imgW, imgH);
  return y + imgH + 6;
}

function buildPdfTextSectionForAnalyzer(idx){
  const name = getAnalyzerName(idx);
  const period = document.getElementById(`periodInfo-${idx}`).textContent.trim();
  const deviceInfo = safeText(document.getElementById(`deviceInfo-${idx}`).innerHTML || '장비 정보 없음');
  const outlier = safeText(document.getElementById(`outlier-${idx}`).innerHTML || '이상값 없음');
  const insight = safeText(document.getElementById(`insight-${idx}`).innerHTML || '분석 결과 없음');
  return { name, period, deviceInfo, outlier, insight };
}

async function exportAnalysisPdf(){
  if(typeof jspdf === 'undefined' && !(window.jspdf && window.jspdf.jsPDF)){
    alert('PDF 라이브러리를 불러오지 못했습니다.');
    return;
  }

  const jsPDFCtor = (window.jspdf && window.jspdf.jsPDF) ? window.jspdf.jsPDF : jspdf.jsPDF;
  const doc = new jsPDFCtor({ unit: 'mm', format: 'a4', orientation: 'portrait' });

  let y = 14;
  doc.setFontSize(20);
  doc.setFont(undefined, 'bold');
  doc.text('젠트라 데이터 분석기', 12, y);
  y += 8;
  doc.setFontSize(10);
  doc.setFont(undefined, 'normal');
  doc.text('분석기별 결과와 종합분석 결과를 함께 정리한 출력용 보고서입니다.', 12, y);
  y += 10;

  for(let i=1;i<=3;i++){
    const s = getState(i);
    if(!s.rawData.length) continue;

    const sec = buildPdfTextSectionForAnalyzer(i);
    y = addSectionHeader(doc, `분석기${i} 이름: ${sec.name}`, y);
    y = addParagraph(doc, `기간: ${sec.period}`, y);
    y = addSectionHeader(doc, '장비', y);
    y = addParagraph(doc, sec.deviceInfo || '장비 정보 없음', y);
    y = addSectionHeader(doc, '그래프', y);
    y = addChartImage(doc, `trendChart-${i}`, y);
    y = addSectionHeader(doc, '이상탐지', y);
    y = addParagraph(doc, sec.outlier || '이상값 없음', y);
    y = addSectionHeader(doc, '상관분석', y);
    y = addParagraph(doc, sec.insight || '분석 결과 없음', y);
    y += 4;
  }

  y = addSectionHeader(doc, '종합분석', y);
  y = addParagraph(doc, safeText(document.getElementById('globalSummary').innerHTML || '종합 분석 전입니다.'), y);
  y = addSectionHeader(doc, '종합그래프', y);
  y = addChartImage(doc, 'globalTrendChart', y);
  y = addSectionHeader(doc, 'Pearson 결과', y);
  y = addParagraph(doc, safeText(document.getElementById('globalCorrelation').innerHTML || '상관 결과 없음'), y);

  doc.save('젠트라_데이터_분석기_결과.pdf');
}
document.addEventListener('DOMContentLoaded',()=>{
  const imgBtn=document.getElementById('globalDownloadImages');
  const pdfBtn=document.getElementById('globalDownloadPdf');

  if(imgBtn) imgBtn.addEventListener('click', downloadAvailableCharts);
  if(pdfBtn) pdfBtn.addEventListener('click', exportAnalysisPdf);
});
